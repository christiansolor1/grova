# Nginx config para grovaapp.com — Symfony 7.4 + PHP-FPM
# Ubicación en el servidor: /etc/nginx/sites-available/grovaapp.com
# Activar con: ln -s /etc/nginx/sites-available/grovaapp.com /etc/nginx/sites-enabled/

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name grovaapp.com www.grovaapp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://grovaapp.com$request_uri;
    }
}

# Redirigir www → sin www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.grovaapp.com;

    ssl_certificate     /etc/letsencrypt/live/grovaapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grovaapp.com/privkey.pem;

    return 301 https://grovaapp.com$request_uri;
}

# Servidor principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grovaapp.com;

    root /var/www/grova/public;
    index index.php;

    # ── SSL ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/grovaapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grovaapp.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Seguridad — headers ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # ── Logs ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/grovaapp.access.log;
    error_log  /var/log/nginx/grovaapp.error.log;

    # ── Límites ──────────────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Assets estáticos con caché larga ─────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Symfony front controller ──────────────────────────────────────────
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # ── PHP-FPM ──────────────────────────────────────────────────────────
    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        # Timeouts para requests largos (migraciones, imports)
        fastcgi_read_timeout 120;
        fastcgi_connect_timeout 10;

        internal;
    }

    # Bloquear acceso a otros .php
    location ~ \.php$ {
        return 404;
    }

    # Bloquear archivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
