# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    default_locale: es
    translator:
        default_path: '%kernel.project_dir%/translations'
        fallbacks: [es]

    # Sesión con timeout de inactividad (30 minutos)
    session:
        cookie_lifetime: 0          # expira al cerrar el navegador
        gc_maxlifetime: 1800        # 30 min de inactividad → sesión inválida
        cookie_secure: auto         # https en prod, http en dev automáticamente
        cookie_httponly: true       # inaccesible desde JS → protege contra XSS
        cookie_samesite: lax        # protege contra CSRF cross-origin

    #esi: true
    #fragments: true

when@dev:
    framework:
        profiler:
            enabled: true
            collect: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
