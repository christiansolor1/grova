security:
    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_DEVELOPER, ROLE_ADMIN, ROLE_USER, ROLE_ALLOWED_TO_SWITCH]
        ROLE_DEVELOPER:   [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]
        ROLE_ADMIN:       [ROLE_USER,  ROLE_ALLOWED_TO_SWITCH]

    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            id: App\Security\ProveedorUsuario

    firewalls:
        dev_toolbar:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # ── API — stateless JWT ───────────────────────────────────────────
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            jwt: ~

        # ── Web — session based (prod + dev prefix) ───────────────────────
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\VerificadorUsuario
            access_denied_handler: App\Security\AccessDeniedHandler
            switch_user:
                role: ROLE_ALLOWED_TO_SWITCH
                parameter: _switch_user
            form_login:
                login_path: login
                check_path: login_check
                username_parameter: username
                password_parameter: password
                default_target_path: workspace
                always_use_default_target_path: false
                enable_csrf: true
                csrf_parameter: _csrf_token
                csrf_token_id: authenticate
            custom_authenticators:
                - App\Security\AuthenticatorGoogle
            logout:
                path: logout
                target: login
                invalidate_session: true
                clear_site_data: ['cache', 'cookies']
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
                post_only: true
                default_target_path: /
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                secure: false      # sobreescrito en prod (when@prod abajo)
                httponly: true
                samesite: lax

    access_control:
        # API pública
        - { path: '^/api/auth/login',    roles: PUBLIC_ACCESS }
        - { path: '^/api/auth/register', roles: PUBLIC_ACCESS }
        - { path: '^/api/docs',          roles: PUBLIC_ACCESS }
        - { path: '^/api/contexts',      roles: PUBLIC_ACCESS }
        - { path: '^/api$',              roles: PUBLIC_ACCESS }
        - { path: '^/api',               roles: IS_AUTHENTICATED_FULLY }
        # Instalador (solo accesible antes de crear .env.local; el controlador devuelve 404 si ya está instalado)
        - { path: '^/setup',                     roles: PUBLIC_ACCESS }
        # Registro de nuevos tenants (prueba 30 días)
        - { path: '^/registro',                  roles: PUBLIC_ACCESS }
        - { path: '^/verificar-email',           roles: PUBLIC_ACCESS }
        - { path: '^/recuperar-contrasena',      roles: PUBLIC_ACCESS }
        - { path: '^/nueva-contrasena',          roles: PUBLIC_ACCESS }
        # 2FA setup (requiere sesión completa)
        - { path: '^/perfil/2fa',                roles: IS_AUTHENTICATED_FULLY }
        # Generador de contraseñas
        - { path: '^/generar-contrasena',         roles: PUBLIC_ACCESS }
        # 2FA — solo accesible mientras el 2FA está en progreso
        - { path: '^/2fa$',                      roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: '^/2fa/check',                 roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: '^/2fa/webauthn',              roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: '^/2fa/enviar-codigo-email',   roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: '^/2fa/webauthn',              roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        # Super Admin — solo español
        - { path: '^/es/admin',                 roles: ROLE_SUPER_ADMIN }
        # Web pública
        - { path: '^/connect/google',                roles: PUBLIC_ACCESS }
        - { path: '^/(es|en)/login',              roles: PUBLIC_ACCESS }
        - { path: '^/(es|en)/lock/login-webauthn', roles: PUBLIC_ACCESS }
        - { path: '^/(es|en)/tasas-cambio',       roles: PUBLIC_ACCESS }
        - { path: '^/$',                 roles: PUBLIC_ACCESS }
        # Web protegida prod
        - { path: '^/(es|en)/',          roles: IS_AUTHENTICATED_FULLY }

when@prod:
    security:
        firewalls:
            main:
                remember_me:
                    secure: true    # fuerza HTTPS en prod
