# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.version: '%env(APP_VERSION)%'
    app.git_sha: '%env(APP_GIT_SHA)%'
    mailer_from_email: '%env(MAILER_FROM_EMAIL)%'
    default_license_key: ''

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\Setup\EstadoInstalacion:
        arguments:
            $directorioProyecto: '%kernel.project_dir%'

    App\Service\Setup\InstaladorGrova:
        arguments:
            $directorioProyecto: '%kernel.project_dir%'

    App\Service\GuardiaSubscripcion:
        arguments:
            $licenseKey: '%env(default:default_license_key:LICENSE_KEY)%'

    App\Service\GeneradorLicencias:
        arguments:
            $keypairBase64: '%env(default::LICENSE_KEYPAIR)%'

    App\Service\ValidadorLicencias:
        arguments:
            $clavePublicaBase64: '%env(default::LICENSE_PUBLIC_KEY)%'

    App\Service\BuildInfoProvider:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $baseVersion: '%app.version%'
            $defaultGitSha: '%app.git_sha%'

    App\Command\TransBuildCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\TransAuditCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\WorkInvoicePaymentProofStorage:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\Respaldo\RespaldoWork:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\Respaldo\RespaldoModuloService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\Tenant\RegistradorTenant:
        arguments:
            $emCore: '@doctrine.orm.core_entity_manager'
            $conexionCore: '@doctrine.dbal.core_connection'

    App\Security\ProveedorUsuario:
        arguments:
            $emCore: '@doctrine.orm.core_entity_manager'

    App\Service\Auth\ServicioVerificacionEmail:
        arguments:
            $emCore: '@doctrine.orm.core_entity_manager'

    App\Service\Auth\ServicioRecuperacionContrasena:
        arguments:
            $emCore: '@doctrine.orm.core_entity_manager'

    App\EventListener\JWTCreatedListener:
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_jwt_created, method: onJWTCreated }

    App\Security\TwoFactor\ProveedorMFA:
        tags:
            - { name: scheb_two_factor.provider, alias: grova_mfa }

    App\Service\Auth\ServicioGeolocalizacion:
        arguments:
            $cacheDir: '%kernel.cache_dir%'

    App\Controller\ControladorRecuperacion:
        arguments:
            $recaptchaSiteKey: '%env(RECAPTCHA_SITE_KEY)%'
            $recaptchaSecretKey: '%env(RECAPTCHA_SECRET_KEY)%'

    App\Controller\ProfileController:
        arguments:
            $recaptchaSiteKey: '%env(RECAPTCHA_SITE_KEY)%'
            $recaptchaSecretKey: '%env(RECAPTCHA_SECRET_KEY)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
