# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# ── Super Admin (solo /es/admin) ────────────────────────────────────────────
web_admin:
    resource: '../src/Controller/Admin/'
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: es
    defaults:
        _locale: es

# ── Recuperación de contraseña (sin locale) ──────────────────────────────────
web_recuperacion:
    resource: '../src/Controller/ControladorRecuperacion.php'
    type: attribute

# ── Doble factor (sin locale) ────────────────────────────────────────────────
web_dos_factores:
    resource: '../src/Controller/ControladorDosFactores.php'
    type: attribute

# ── Registro público (sin locale) ────────────────────────────────────────────
web_registro:
    resource: '../src/Controller/ControladorRegistro.php'
    type: attribute

# ── Google OAuth (sin locale) ─────────────────────────────────────────────────
web_google:
    resource: '../src/Controller/ControladorGoogle.php'
    type: attribute

# ── Instalador web (sin locale) ───────────────────────────────────────────────
web_setup:
    resource: '../src/Controller/ControladorInstalacion.php'
    type: attribute

# ── Suscripción (sin locale — accesible aunque la suscripción haya vencido) ───
web_subscripcion:
    resource: '../src/Controller/ControladorSubscripcion.php'
    type: attribute

# ── API — sin prefijo de locale ───────────────────────────────────────────────
api_controllers:
    resource: '../src/Controller/Api/'
    type: attribute

# ── Web /{_locale}/ ─────────────────────────────────────────────────────────
web_login:
    resource: '../src/Controller/LoginController.php'
    type: attribute
    prefix: /{_locale}
    name_prefix: ''
    requirements:
        _locale: es|en
    defaults:
